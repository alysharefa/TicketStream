"""
Service 3 — Payment and Ticket Issuing (GraphQL Manual via Lighthouse).

Skema ini mendefinisikan query untuk mengecek status tiket yang telah
diproses oleh worker. Tipe dan resolver ditulis MANUAL (bukan auto-generate),
mendemonstrasikan pendekatan GraphQL manual berbeda dari Hasura (auto-generate
di Service 1).

Endpoint: POST http://localhost:8002/graphql
"""

scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

# ----------------------------------------------------------------------
# Types
# ----------------------------------------------------------------------

"""
Tiket — hasil pemrosesan pesanan oleh worker Service 3.
Dipetakan ke model Eloquent App\Models\Ticket.
"""
type Ticket @model(class: "App\\Models\\Ticket") {
  id: ID!
  order_code: String!
  concert_id: Int!
  user_id: String!
  ticket_code: String
  status: String!
  issued_at: DateTime
  created_at: DateTime
}

"""
Payment — catatan pembayaran pesanan.
Dipetakan ke model Eloquent App\Models\Payment.
"""
type Payment @model(class: "App\\Models\\Payment") {
  id: ID!
  order_code: String!
  amount: Int!
  status: String!
  paid_at: DateTime
  created_at: DateTime
}

# ----------------------------------------------------------------------
# Queries — mencari tiket berdasarkan order_code / ticket_code / user_id
# ----------------------------------------------------------------------

type Query {
  """
  Cari satu tiket berdasarkan order_code pesanan.
  Bila satu pesanan menghasilkan beberapa tiket, mengembalikan yang pertama.
  """
  ticketByOrder(order_code: String! @eq): Ticket @first

  """
  Cari satu tiket berdasarkan kode tiket (TKT-2026-XYZ99).
  """
  ticket(ticket_code: String! @eq): Ticket @find

  """
  Semua tiket milik seorang user.
  """
  myTickets(user_id: String! @eq): [Ticket!]! @all

  """
  Cek pembayaran berdasarkan order_code.
  """
  paymentByOrder(order_code: String! @eq): Payment @find
}
